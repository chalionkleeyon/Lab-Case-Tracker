<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoboken Scan Logger - Sign In</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #334155; }
        .input-field { transition: all 0.2s ease; }
        .input-field:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4 selection:bg-brand-100 selection:text-brand-900">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600 border border-brand-100">
                <i class="ph-fill ph-tooth text-2xl"></i>
            </div>
            <div>
                <h1 class="text-base font-bold text-slate-800 leading-tight">Digital Lab Tracker</h1>
                <p class="text-xs text-slate-500">Hoboken Clinic Staff Access</p>
            </div>
        </div>
        <form id="gateForm" class="space-y-3">
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-600 block">Clinic Password</label>
                <input type="password" id="gatePassword" required autocomplete="current-password" autofocus
                    class="input-field w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 font-medium">
            </div>
            <button type="submit" id="gateSubmit" class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-lg shadow-sm shadow-brand-200 transition-colors">
                Unlock
            </button>
            <p id="gateError" class="text-xs text-center text-red-500 font-semibold h-4"></p>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://cbudtxetkgqesbslfcqs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNidWR0eGV0a2dxZXNic2xmY3FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTA5MjksImV4cCI6MjA5OTYyNjkyOX0.d2pgcF0unScLNPMWYhYJiiB6Fsbh0y7LO1BdH8JND7w';
        const GATE_FUNCTION_URL = SUPABASE_URL + '/functions/v1/gate-login';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.replace('index.html');
                return;
            }

            const form = document.getElementById('gateForm');
            const errorEl = document.getElementById('gateError');
            const submitBtn = document.getElementById('gateSubmit');
            const passwordInput = document.getElementById('gatePassword');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.textContent = '';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Checking...';

                try {
                    const res = await fetch(GATE_FUNCTION_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
                        body: JSON.stringify({ password: passwordInput.value }),
                    });
                    const result = await res.json().catch(() => ({}));

                    if (!res.ok) {
                        errorEl.textContent = result.error || 'Incorrect password.';
                        passwordInput.value = '';
                        passwordInput.focus();
                        return;
                    }

                    const { error } = await sb.auth.setSession({
                        access_token: result.access_token,
                        refresh_token: result.refresh_token,
                    });
                    if (error) {
                        errorEl.textContent = 'Failed to start session.';
                        return;
                    }

                    window.location.replace('index.html');
                } catch (err) {
                    errorEl.textContent = 'Network error. Please try again.';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Unlock';
                }
            });
        });
    </script>
</body>
</html>
